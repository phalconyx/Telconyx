services:
  telconyx:
    build:
      context: .
      dockerfile: Dockerfile
    image: telconyx:local
    container_name: telconyx
    ports:
      - "9090:9090"
    environment:
      # Single-bot mode. Leave empty when using TELCONYX_ROUTES instead;
      # the server validates at startup that one of the two is configured.
      TELCONYX_BOT_TOKEN: "${TELCONYX_BOT_TOKEN:-}"
      TELCONYX_CHAT_ID: "${TELCONYX_CHAT_ID:-}"
      # Multi-bot mode: "alias=token@chat_id,..." (see README "Scaling").
      TELCONYX_ROUTES: "${TELCONYX_ROUTES:-}"
      TELCONYX_DEFAULT_ROUTE: "${TELCONYX_DEFAULT_ROUTE:-}"
      TELCONYX_API_BASE: "${TELCONYX_API_BASE:-}"
      TELCONYX_API_KEY: "${TELCONYX_API_KEY:-}"
      TELCONYX_LISTEN: ":9090"
      TELCONYX_TIMEOUT: "${TELCONYX_TIMEOUT:-60s}"
      TELCONYX_MAX_UPLOAD_SIZE: "${TELCONYX_MAX_UPLOAD_SIZE:-2GB}"
      TELCONYX_MAX_DOWNLOAD_SIZE: "${TELCONYX_MAX_DOWNLOAD_SIZE:-2GB}"
      TELCONYX_CHUNK_SIZE: "${TELCONYX_CHUNK_SIZE:-19MB}"
      TELCONYX_CHUNK_CONCURRENCY: "${TELCONYX_CHUNK_CONCURRENCY:-3}"
    # Uploads are staged in /tmp before being sent to Telegram. A named
    # (disk-backed) volume keeps multi-GB spool files out of the container's
    # writable layer; do NOT use tmpfs here — it would spool into RAM.
    volumes:
      - telconyx-tmp:/tmp
    restart: unless-stopped
    healthcheck:
      # The distroless image has no shell/curl; the binary probes /health itself.
      test: ["CMD", "/usr/local/bin/telconyx", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  telconyx-tmp:
